<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
      <circle cx='50' cy='50' r='48' fill='%23333' stroke='%23000' stroke-width='2'/>
      <circle cx='50' cy='50' r='40' fill='%23fff'/>
      <line x1='50' y1='15' x2='50' y2='25' stroke='%23000' stroke-width='2'/>
      <line x1='50' y1='75' x2='50' y2='85' stroke='%23000' stroke-width='2'/>
      <line x1='15' y1='50' x2='25' y2='50' stroke='%23000' stroke-width='2'/>
      <line x1='75' y1='50' x2='85' y2='50' stroke='%23000' stroke-width='2'/>
      <line x1='50' y1='50' x2='50' y2='30' stroke='%23000' stroke-width='3'/>
      <line x1='50' y1='50' x2='65' y2='50' stroke='%23ff0000' stroke-width='2'/>
    </svg>"
</head>
<body>
  <div class="clock-container">
    <div class="continent-selector">
      <label for="continentSelect">Continent:</label>
      <select id="continentSelect">
        <option value="America/New_York">North America</option>
        <option value="America/Sao_Paulo">South America</option>
        <option value="Europe/London">Europe</option>
        <option value="Africa/Cairo">Africa</option>
        <option value="Africa/Lagos">Nigeria</option>
        <option value="Africa/Accra">Ghana</option>
        <option value="Africa/Johannesburg">South Africa</option>
        <option value="Asia/Tokyo">Asia</option>
        <option value="Australia/Sydney">Oceania</option>
        <option value="Antarctica/McMurdo">Antarctica</option>
      </select>
    </div>
    <div class="time" id="time">00:00:00<span class="ampm" id="ampm"></span></div>
    <div class="date" id="date"></div>
    <div class="day" id="day"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
